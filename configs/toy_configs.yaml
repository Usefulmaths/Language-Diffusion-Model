# Toy configuration for small-scale experiments
seed: 42

tokenizer:
  tokenizer_name: "bert-base-uncased"
  mask_token: "[MASK]"
  pad_token: "[PAD]"
  bos_token: "[CLS]"
  eos_token: "[SEP]"

transformer:
  d_model: 128
  nhead: 4
  num_layers: 2
  dim_feedforward: 512
  dropout: 0.1
  layer_norm_eps: 1.0e-12
  max_position_embeddings: 128

masking:
  strategy: "random"
  mask_ratio: null # Random mask ratio per batch

training:
  batch_size: 4
  learning_rate: 4.0e-4
  weight_decay: 0.01
  num_epochs: 5
  max_length: 128
  num_workers: 1
  device: "cpu"
  use_amp: false
  gradient_clip_val: 1.0
  early_stopping_patience: 3
  log_interval: 10
  checkpoint_dir: "checkpoints/toy"
  scheduler:
    warmup_steps: 100
    initial_lr: 0.0
    peak_lr: 4.0e-4
    stable_lr: 1.0e-4
    final_lr: 1.0e-5

data:
  train_file: "data/small_questions.txt"
  val_file: null
  train_ratio: 0.9
  shuffle: true
